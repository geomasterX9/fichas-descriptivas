<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — EST 84</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #1B4F8A; --azul-hover: #163f6e; --azul-claro: #eff6ff;
            --fondo: #f0f4f8; --blanco: #fff; --texto: #1a2332;
            --muted: #64748b; --borde: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--fondo);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Fondo decorativo */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0;
            height: 50vh;
            background: linear-gradient(135deg, #1B4F8A 0%, #163f6e 60%, #0f2d52 100%);
            z-index: 0;
        }

        .login-wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
        }

        /* Encabezado sobre la card */
        .login-brand {
            text-align: center; color: white; margin-bottom: 24px;
        }
        .login-brand .icono {
            width: 68px; height: 68px; border-radius: 18px;
            background: rgba(255,255,255,0.15);
            border: 1.5px solid rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 34px; margin: 0 auto 14px;
        }
        .login-brand h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .login-brand p  { font-size: 13px; opacity: 0.75; }

        /* Card */
        .login-card {
            background: var(--blanco);
            border-radius: 20px;
            padding: 32px 28px 28px;
            box-shadow: 0 20px 60px rgba(15,23,42,0.18);
        }

        .grupo-input { margin-bottom: 18px; }
        .grupo-input label {
            display: block; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--muted); margin-bottom: 6px;
        }
        .grupo-input input,
        .grupo-input select {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--borde); border-radius: 10px;
            font-size: 14px; font-family: 'Outfit', sans-serif;
            color: var(--texto); background: #fcfdfd;
            outline: none; transition: border-color 0.15s, box-shadow 0.15s;
            appearance: none;
        }
        .grupo-input input:focus,
        .grupo-input select:focus {
            border-color: var(--azul);
            box-shadow: 0 0 0 3px rgba(27,79,138,0.1);
        }

        .btn-ingresar {
            width: 100%; padding: 13px;
            background: var(--azul); color: white;
            border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer; transition: all 0.2s;
            margin-top: 4px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-ingresar:hover { background: var(--azul-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(27,79,138,0.3); }
        .btn-ingresar:active { transform: translateY(0); }

        .mensaje-error {
            background: #fff0f1; border: 1px solid #fecdd3; color: #be123c;
            border-radius: 10px; padding: 10px 14px;
            font-size: 13px; font-weight: 600;
            margin-top: 14px; display: none;
            text-align: center;
        }

        .footer-login {
            margin-top: 24px; text-align: center;
            font-size: 11px; color: var(--muted); line-height: 1.7;
        }
        .footer-login a { color: var(--muted); text-decoration: underline; }

        /* Responsive */
        @media (max-width: 440px) {
            .login-card { padding: 24px 20px; }
        }
    </style>
</head>
<body>

    <div class="login-wrap">

        <div class="login-brand">
            <div class="icono">🎓</div>
            <h1>Gestión Escolar</h1>
            <p>Técnica 84 · Plataforma Segura</p>
        </div>

        <div class="login-card">
            <div class="grupo-input">
                <label>Tipo de usuario</label>
                <select id="inRol">
                    <option value="ADMINISTRADOR">Administrador</option>
                    <option value="DOCENTE">Docente</option>
                    <option value="PREFECTO">Prefecto</option>
                    <option value="TRABAJO SOCIAL">Trabajo Social</option>
                    <option value="DIRECTIVO">Directivo</option>
                </select>
            </div>
            <div class="grupo-input">
                <label>Usuario</label>
                <input type="text" id="inUsuario" placeholder="ej. jmendez" autocomplete="off">
            </div>
            <div class="grupo-input">
                <label>Contraseña</label>
                <input type="password" id="inPassword" placeholder="••••••••">
            </div>

            <button class="btn-ingresar" onclick="iniciarSesion()" id="btnSubmit">
                Ingresar al Sistema →
            </button>

            <div id="msgError" class="mensaje-error"></div>

            <div class="footer-login">
                🔒 Acceso encriptado · Uso exclusivo personal autorizado<br>
                <a href="aviso-privacidad.html" target="_blank">📄 Aviso de Privacidad</a>
            </div>
        </div>

    </div>

    <script src="auth-helper.js"></script>
    <script>
        document.addEventListener('keypress', e => { if (e.key === 'Enter') iniciarSesion(); });

        async function iniciarSesion() {
            const user = document.getElementById('inUsuario').value.trim();
            const pass = document.getElementById('inPassword').value.trim();
            const rol  = document.getElementById('inRol').value;
            const msgError = document.getElementById('msgError');
            const btn  = document.getElementById('btnSubmit');

            if (!user || !pass) {
                msgError.innerText = 'Por favor, llena todos los campos.';
                msgError.style.display = 'block'; return;
            }

            btn.innerHTML = 'Verificando...'; btn.style.opacity = '0.8';
            msgError.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: user, password: pass, rol })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('nombreActivo', data.nombre_completo);
                    localStorage.setItem('rolActivo', data.rol);
                    localStorage.setItem('authToken', data.token);
                    registrarLog('LOGIN', `Acceso como ${data.rol}`);
                    btn.innerHTML = '✅ Acceso correcto';
                    btn.style.background = '#2d9b6f';
                    setTimeout(() => {
                        const r = data.rol;
                        if (r === 'ADMINISTRADOR' || r === 'DIRECTIVO') window.location.href = 'dashboard.html';
                        else if (r === 'TRABAJO SOCIAL') window.location.href = 'buscador.html';
                        else window.location.href = 'inicio.html';
                    }, 900);
                } else {
                    msgError.innerText = data.error || 'Usuario, contraseña o rol incorrectos.';
                    msgError.style.display = 'block';
                    btn.innerHTML = 'Ingresar al Sistema →';
                    btn.style.opacity = '1'; btn.style.background = 'var(--azul)';
                }
            } catch {
                msgError.innerText = 'Error de conexión con el servidor.';
                msgError.style.display = 'block';
                btn.innerHTML = 'Ingresar al Sistema →';
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
