<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista para Fotografías - EST 84</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #1B4F8A; --azul-hover: #163f6e; --azul-claro: #eff6ff;
            --fondo: #f0f4f8; --blanco: #fff; --borde: #e2e8f0;
            --texto: #1a2332; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--fondo); color: var(--texto); }

        /* NAVBAR */
        .navbar {
            background: var(--azul); padding: 0 24px; height: 62px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 12px rgba(27,79,138,0.25);
            position: sticky; top: 0; z-index: 100;
        }
        .navbar-brand { display: flex; align-items: center; gap: 10px; color: white; font-weight: 800; font-size: 17px; }
        .navbar-menu { display: flex; align-items: center; gap: 8px; }
        .navbar-menu a {
            text-decoration: none; color: rgba(255,255,255,0.8); font-weight: 600;
            font-size: 13px; padding: 7px 14px; border-radius: 8px; transition: all 0.15s;
        }
        .navbar-menu a:hover { background: rgba(255,255,255,0.12); color: white; }
        .navbar-menu a.salir { color: #fca5a5; }
        .navbar-menu a.salir:hover { background: rgba(230,57,70,0.2); }

        .contenedor { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

        /* CONTROLES */
        .controles { background: var(--blanco); border-radius: 16px; border: 1px solid var(--borde); padding: 22px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
        .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
        .ctrl-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
        select, input { padding: 10px 14px; border: 1.5px solid var(--borde); border-radius: 10px; font-size: 14px; font-family: 'Outfit', sans-serif; color: var(--texto); background: var(--blanco); appearance: none; }
        select:focus, input:focus { outline: none; border-color: var(--azul); }
        .btn { padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Outfit', sans-serif; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: var(--azul); color: white; }
        .btn-primary:hover { background: #004ab3; }
        .btn-print { background: #1e293b; color: white; }
        .btn-print:hover { background: #0f172a; }
        .badge { background: #eff6ff; color: var(--azul); border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 700; align-self: center; }

        /* TABLA */
        .tabla-wrap { background: var(--blanco); border-radius: 16px; border: 1px solid var(--borde); overflow: hidden; }
        .tabla-header { padding: 16px 22px; border-bottom: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; }
        .tabla-header h2 { font-size: 16px; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); border-bottom: 1px solid var(--borde); }
        td { padding: 11px 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
        .num-orden { width: 48px; height: 48px; border: 2px solid var(--borde); border-radius: 8px; text-align: center; font-size: 15px; font-weight: 700; color: var(--muted); }
        .chip-id { background: #eff6ff; color: var(--azul); border-radius: 6px; padding: 3px 10px; font-size: 13px; font-weight: 700; display: inline-block; }
        .chip-foto { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .chip-foto.sin { background: #fef9c3; color: #854d0e; }
        .chip-foto.con { background: #f0fdf4; color: #166534; }
        .casilla { width: 22px; height: 22px; border: 2px solid var(--borde); border-radius: 5px; }
        .empty-state { text-align: center; padding: 50px; color: var(--muted); }

        /* IMPRIMIR */
        @media print {
            @page { size: letter landscape; margin: 10mm 12mm; }
            body { background: white; padding: 0; font-size: 9px; }
            .controles, .btn-print, .btn-primary, .no-print { display: none !important; }
            .contenedor { max-width: 100%; }
            .tabla-wrap { border: none; box-shadow: none; border-radius: 0; }
            .tabla-header { border-bottom: 2px solid #000; padding: 6px 0; }
            .tabla-header h2 { font-size: 11px; }
            th { background: #ddd !important; font-size: 8px; padding: 5px 8px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            td { padding: 4px 8px; font-size: 9px; border-bottom: 1px solid #eee; }
            .chip-id { background: none; color: #000; padding: 0; font-weight: 700; font-size: 9px; }
            .chip-foto { background: none !important; padding: 0; font-size: 9px; }
            .print-title { display: block !important; }
            .print-title h2 { font-size: 13px; }
            .print-title p { font-size: 9px; }
        }
        .print-title { display: none; text-align: center; margin-bottom: 12px; }
        .print-title h2 { font-size: 16px; }
        .print-title p { font-size: 12px; color: #555; }
    </style>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1B4F8A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sist. EST 84">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

    <nav class="navbar no-print">
        <div class="navbar-brand">🎓 Lista para Fotografías</div>
        <div class="navbar-menu">
            <a href="dashboard.html">← Dashboard</a>
            <a href="#" onclick="cerrarSesion()" class="salir">Salir 👋</a>
        </div>
    </nav>

<div class="contenedor">

    <!-- CONTROLES -->
    <div class="controles">
        <div class="ctrl-group">
            <label>Grado</label>
            <select id="filtroGrado" onchange="filtrar()">
                <option value="">Todos</option>
                <option value="1">1°</option>
                <option value="2">2°</option>
                <option value="3">3°</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>Grupo</label>
            <select id="filtroGrupo" onchange="filtrar()">
                <option value="">Todos</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
                <option value="F">F</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>Mostrar</label>
            <select id="filtroFoto" onchange="filtrar()">
                <option value="">Todos los alumnos</option>
                <option value="sin">Sin foto</option>
                <option value="con">Con foto</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>Ordenar por</label>
            <select id="filtroOrden" onchange="filtrar()">
                <option value="apellido">Apellido</option>
                <option value="id">ID</option>
            </select>
        </div>
        <button class="btn btn-primary no-print" onclick="cargarAlumnos()">↻ Actualizar</button>
        <button class="btn btn-print no-print" onclick="window.print()">🖨️ Imprimir Lista</button>
        <span class="badge no-print" id="conteo">—</span>
    </div>

    <!-- TABLA -->
    <div class="tabla-wrap">
        <div class="print-title">
            <h2>EST 84 — Lista para Fotografías</h2>
            <p id="printSubtitle">Generada el <span id="printFecha"></span></p>
        </div>
        <div class="tabla-header">
            <h2 id="tituloTabla">Lista de Alumnos</h2>
        </div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>ID</th>
                    <th>Nombre Completo</th>
                    <th>Grado / Grupo</th>
                    <th>Foto actual</th>
                    <th class="no-print">✓</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <tr><td colspan="6" class="empty-state">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script src="auth-helper.js"></script>
<script>
    verificarSesion();

    let todosAlumnos = [];

    document.getElementById('printFecha').textContent = new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'long', year:'numeric' });

    async function cargarAlumnos() {
        const tbody = document.getElementById('cuerpoTabla');
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Cargando...</td></tr>';
        try {
            const res = await apiFetch('/api/alumnos');
            todosAlumnos = await res.json();
            filtrar();
        } catch(e) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Error al cargar alumnos.</td></tr>';
        }
    }

    function filtrar() {
        const grado = document.getElementById('filtroGrado').value;
        const grupo = document.getElementById('filtroGrupo').value;
        const foto  = document.getElementById('filtroFoto').value;
        const orden = document.getElementById('filtroOrden').value;

        let lista = [...todosAlumnos];
        if (grado) lista = lista.filter(a => String(a.grado) === grado);
        if (grupo) lista = lista.filter(a => a.grupo === grupo);
        if (foto === 'sin') lista = lista.filter(a => !a['fotos-alumnos']);
        if (foto === 'con') lista = lista.filter(a =>  a['fotos-alumnos']);

        lista.sort((a, b) => orden === 'id'
            ? a.id_alumno - b.id_alumno
            : (a.apellidos + a.nombre).localeCompare(b.apellidos + b.nombre));

        renderTabla(lista);

        // Actualizar título imprimible
        let desc = [];
        if (grado) desc.push(`${grado}° Grado`);
        if (grupo) desc.push(`Grupo ${grupo}`);
        if (foto === 'sin') desc.push('Sin foto');
        if (foto === 'con') desc.push('Con foto');
        const titulo = desc.length ? desc.join(' · ') : 'Todos los alumnos';
        document.getElementById('tituloTabla').textContent = titulo;
        document.getElementById('printSubtitle').innerHTML = `${titulo} &nbsp;|&nbsp; Generada el ${new Date().toLocaleDateString('es-MX', {day:'2-digit',month:'long',year:'numeric'})}`;
    }

    function renderTabla(lista) {
        const tbody = document.getElementById('cuerpoTabla');
        document.getElementById('conteo').textContent = `${lista.length} alumnos`;

        if (lista.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No hay alumnos con esos filtros.</td></tr>';
            return;
        }

        tbody.innerHTML = lista.map((a, i) => `
            <tr>
                <td><strong style="color:var(--muted); font-size:13px;">${i + 1}</strong></td>
                <td><span class="chip-id">${a.id_alumno}</span></td>
                <td><strong>${a.apellidos}</strong> ${a.nombre}</td>
                <td>${a.grado}° "${a.grupo}"</td>
                <td><span class="chip-foto ${a['fotos-alumnos'] ? 'con' : 'sin'}">${a['fotos-alumnos'] ? '✓ Tiene foto' : '✗ Sin foto'}</span></td>
                <td class="no-print"><input type="checkbox" class="casilla"></td>
            </tr>
        `).join('');
    }

    window.onload = cargarAlumnos;
    function cerrarSesion() { localStorage.clear(); window.location.href = 'index.html'; }
</script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(err => console.warn('SW no registrado:', err));
        });
      }
    </script>
</body>
</html>
