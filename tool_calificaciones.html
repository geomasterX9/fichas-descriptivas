<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Calificaciones — EST 84</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #1B4F8A; --azul-hover: #163f6e; --azul-claro: #eff6ff;
            --verde: #2d9b6f; --verde-claro: #f0fdf6;
            --rojo: #e63946; --naranja: #f59e0b;
            --fondo: #f0f4f8; --blanco: #fff;
            --texto: #1a2332; --muted: #64748b; --borde: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--fondo); color: var(--texto); padding: 24px 16px 60px; }
        .contenedor { max-width: 620px; margin: 0 auto; }

        .btn-back {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--blanco); border: 1px solid var(--borde);
            border-radius: 10px; padding: 9px 16px;
            text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 600;
            margin-bottom: 20px; transition: background 0.15s;
        }
        .btn-back:hover { background: var(--borde); }

        .page-header {
            background: var(--azul); color: white; border-radius: 16px;
            padding: 24px 28px; margin-bottom: 20px;
        }
        .page-header h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
        .page-header p  { font-size: 13px; opacity: 0.8; }

        .card {
            background: var(--blanco); border: 1px solid var(--borde);
            border-radius: 16px; padding: 24px; margin-bottom: 16px;
        }

        .filtros-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .filtro-item { flex: 1; min-width: 100px; display: flex; flex-direction: column; gap: 5px; }
        .filtro-item label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--muted);
        }
        .filtro-item select {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--borde);
            border-radius: 10px; font-size: 14px; font-family: 'Outfit', sans-serif;
            color: var(--texto); background: var(--blanco); appearance: none; outline: none;
        }
        .filtro-item select:focus { border-color: var(--azul); }

        .zona-drop {
            border: 2px dashed var(--borde); border-radius: 14px;
            padding: 36px 20px; text-align: center;
            background: #f8fafc; cursor: pointer;
            transition: all 0.2s; margin-bottom: 20px;
        }
        .zona-drop:hover { border-color: var(--azul); background: var(--azul-claro); }
        .zona-drop .icono { font-size: 40px; margin-bottom: 10px; }
        .zona-drop p { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
        .zona-drop .archivo-sel { font-size: 13px; color: var(--azul); font-weight: 700; margin-top: 8px; }

        input[type="file"] { display: none; }
        .btn-sel {
            display: inline-block; padding: 9px 20px;
            background: var(--blanco); border: 1.5px solid var(--azul);
            color: var(--azul); border-radius: 10px;
            font-size: 13px; font-weight: 700; font-family: 'Outfit', sans-serif;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-sel:hover { background: var(--azul-claro); }

        .btn-subir {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            background: var(--azul); color: white;
            font-size: 15px; font-weight: 700; font-family: 'Outfit', sans-serif;
            cursor: pointer; transition: background 0.15s; display: none;
        }
        .btn-subir:hover { background: var(--azul-hover); }

        .log-box {
            border-radius: 12px; padding: 16px; font-size: 13px;
            margin-top: 16px; display: none; line-height: 1.6;
        }
        .log-ok    { background: var(--verde-claro); color: #166534; border: 1px solid #bbf7d0; }
        .log-error { background: #fff0f1; color: var(--rojo); border: 1px solid #fecdd3; }
        .log-load  { background: var(--azul-claro); color: var(--azul); border: 1px solid #bfdbfe; }

        @media (max-width: 500px) { .filtros-row { gap: 8px; } }

        /* Captura manual */
        .seccion-titulo {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--muted); margin-bottom: 14px;
        }
        .input-buscar {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--borde);
            border-radius: 10px; font-size: 14px; font-family: 'Outfit', sans-serif;
            color: var(--texto); background: var(--blanco); outline: none; margin-bottom: 12px;
        }
        .input-buscar:focus { border-color: var(--azul); }
        .alumno-encontrado {
            background: var(--azul-claro); border: 1px solid #bfdbfe;
            border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
            font-size: 14px; font-weight: 700; color: var(--azul); display: none;
        }
        .materias-grid-manual {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }
        .materia-item-manual { display: flex; flex-direction: column; gap: 4px; }
        .materia-label-manual {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.6px; color: var(--muted); text-align: center;
        }
        .materia-input-manual {
            width: 100%; padding: 8px; text-align: center;
            border: 1.5px solid var(--borde); border-radius: 9px;
            font-size: 15px; font-weight: 700; font-family: 'Outfit', sans-serif;
            color: var(--texto); outline: none; transition: border-color 0.15s;
        }
        .materia-input-manual:focus { border-color: var(--azul); }
        .materia-input-manual.riesgo { border-color: var(--rojo); background: #fff0f1; color: var(--rojo); }
        .materia-input-manual.ok { border-color: var(--verde); background: var(--verde-claro); }
    </style>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1B4F8A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sist. EST 84">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
<div class="contenedor">

    <a href="dashboard.html" class="btn-back">← Volver al Dashboard</a>

    <div class="page-header">
        <h1>📊 Importador de Calificaciones</h1>
        <p>Sube el PDF oficial de la SEGE para sincronizar los promedios del grupo.</p>
    </div>

    <div class="card">
        <div class="filtros-row">
            <div class="filtro-item">
                <label>Grado</label>
                <select id="g"><option value="1">1°</option><option value="2">2°</option><option value="3">3°</option></select>
            </div>
            <div class="filtro-item">
                <label>Grupo</label>
                <select id="gr"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
            </div>
            <div class="filtro-item">
                <label>Momento</label>
                <select id="t"><option value="1">Trimestre 1</option><option value="2">Trimestre 2</option><option value="3">Trimestre 3</option></select>
            </div>
        </div>

        <div class="zona-drop" onclick="document.getElementById('archivoPdf').click()">
            <div class="icono">📄</div>
            <p>Haz clic para seleccionar el PDF de la SEGE</p>
            <label class="btn-sel">Seleccionar archivo</label>
            <input type="file" id="archivoPdf" accept=".pdf" onchange="mostrarArchivo()">
            <div class="archivo-sel" id="nombreArchivoText"></div>
        </div>

        <button class="btn-subir" id="btnSubir" onclick="subirYProcesar()">SUBIR Y SINCRONIZAR PROMEDIOS</button>
        <div class="log-box" id="log"></div>
    </div>


    <!-- CARD CAPTURA MANUAL -->
    <div class="card">
        <div class="seccion-titulo">✏️ Captura Manual de Calificaciones</div>
        <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">
            Para alumnos con cambio de grupo u omisiones en la importación masiva.
        </p>

        <div class="filtros-row">
            <div class="filtro-item">
                <label>Grado</label>
                <select id="m-g" onchange="actualizarMaterias()">
                    <option value="1">1°</option>
                    <option value="2">2°</option>
                    <option value="3">3°</option>
                </select>
            </div>
            <div class="filtro-item">
                <label>Grupo</label>
                <select id="m-gr">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                </select>
            </div>
            <div class="filtro-item">
                <label>Trimestre</label>
                <select id="m-t" onchange="actualizarMaterias()">
                    <option value="1">Trimestre 1</option>
                    <option value="2">Trimestre 2</option>
                    <option value="3">Trimestre 3</option>
                </select>
            </div>
        </div>

        <label style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted);">ID o nombre del alumno</label>
        <input type="text" class="input-buscar" id="m-buscar"
            placeholder="Escribe el ID o nombre del alumno..."
            oninput="buscarAlumnoManual()">
        <div id="m-resultados" style="margin-bottom:12px;"></div>
        <div class="alumno-encontrado" id="m-alumno-sel"></div>

        <div id="m-form" style="display:none;">
            <div class="materias-grid-manual" id="m-materias"></div>
            <button class="btn-subir" style="display:block;" onclick="guardarManual()">
                💾 GUARDAR CALIFICACIONES
            </button>
            <div class="log-box" id="m-log"></div>
        </div>
    </div>

</div>

<script src="auth-helper.js"></script>
<script>
    verificarSesion();

    function mostrarArchivo() {
        const input = document.getElementById('archivoPdf');
        if (input.files.length > 0) {
            document.getElementById('nombreArchivoText').textContent = '✅ ' + input.files[0].name;
            document.getElementById('btnSubir').style.display = 'block';
            document.getElementById('log').style.display = 'none';
        }
    }

    async function subirYProcesar() {
        const archivoInput = document.getElementById('archivoPdf');
        const logBox = document.getElementById('log');
        if (archivoInput.files.length === 0) return alert('Selecciona un archivo PDF.');

        logBox.className = 'log-box log-load'; logBox.style.display = 'block';
        logBox.innerHTML = '⏳ Procesando archivo, por favor espera...';

        const formData = new FormData();
        formData.append('documento', archivoInput.files[0]);
        formData.append('grado', document.getElementById('g').value);
        formData.append('grupo', document.getElementById('gr').value);
        formData.append('trimestre', document.getElementById('t').value);

        try {
            const res = await apiFetch('/api/importar-calificaciones', { method: 'POST', body: formData });
            const data = await res.json();
            if (res.ok) {
                logBox.className = 'log-box log-ok';
                logBox.innerHTML = `✅ <strong>¡Éxito!</strong> Las calificaciones se sincronizaron correctamente.`;
            } else {
                logBox.className = 'log-box log-error';
                logBox.innerHTML = '❌ Error: ' + (data.error || 'No se pudo procesar el archivo');
            }
        } catch {
            logBox.className = 'log-box log-error';
            logBox.innerHTML = '❌ Error de conexión con el servidor.';
        }
    }
</script>

<script>
    // ── CAPTURA MANUAL ──────────────────────────────────────
    const MATERIAS_MANUAL = {
        1: ['ESP','MAT','SLI','CIE','HIS','GMM','FCE','ETE','EFI','ART','ESO'],
        2: ['ESP','MAT','SLI','CIE','HIS','FCE','ETE','EFI','ART','ESO'],
        3: ['ESP','MAT','SLI','CIE','HIS','FCE','ETE','EFI','ART','ESO']
    };

    let alumnoSelManual = null;
    let todosAlumnos = [];

    // Cargar todos los alumnos al inicio
    window.addEventListener('load', async () => {
        try {
            const res = await apiFetch('/api/alumnos');
            if (res) todosAlumnos = await res.json();
        } catch(e) {}
    });

    function actualizarMaterias() {
        if (alumnoSelManual) renderMateriasManual();
    }

    function buscarAlumnoManual() {
        const q = document.getElementById('m-buscar').value.trim().toLowerCase();
        const cont = document.getElementById('m-resultados');
        if (q.length < 2) { cont.innerHTML = ''; return; }

        const resultados = todosAlumnos.filter(a =>
            String(a.id_alumno) === q ||
            `${a.apellidos} ${a.nombre}`.toLowerCase().includes(q)
        ).slice(0, 6);

        if (resultados.length === 0) {
            cont.innerHTML = '<div style="font-size:13px; color:var(--muted); padding:8px 0;">Sin resultados.</div>';
            return;
        }

        cont.innerHTML = resultados.map(a => `
            <div onclick="seleccionarAlumnoManual(${a.id_alumno})"
                style="padding:10px 14px; background:var(--blanco); border:1.5px solid var(--borde);
                border-radius:10px; margin-bottom:6px; cursor:pointer; font-size:13px;
                font-weight:600; transition:border-color 0.15s;"
                onmouseover="this.style.borderColor='var(--azul)'"
                onmouseout="this.style.borderColor='var(--borde)'">
                <span style="color:var(--azul); font-weight:800;">#${a.id_alumno}</span>
                — ${a.apellidos} ${a.nombre}
                <span style="color:var(--muted); font-weight:400;">${a.grado}° "${a.grupo}"</span>
            </div>`).join('');
    }

    async function seleccionarAlumnoManual(id) {
        alumnoSelManual = todosAlumnos.find(a => a.id_alumno === id);
        if (!alumnoSelManual) return;

        document.getElementById('m-buscar').value = `${alumnoSelManual.apellidos} ${alumnoSelManual.nombre}`;
        document.getElementById('m-resultados').innerHTML = '';
        // Precargar grado y grupo del alumno
        document.getElementById('m-g').value  = String(alumnoSelManual.grado);
        document.getElementById('m-gr').value = alumnoSelManual.grupo;

        const sel = document.getElementById('m-alumno-sel');
        sel.textContent = `✅ ${alumnoSelManual.apellidos} ${alumnoSelManual.nombre} — ${alumnoSelManual.grado}° Grupo "${alumnoSelManual.grupo}"`;
        sel.style.display = 'block';

        await renderMateriasManual();
        document.getElementById('m-form').style.display = 'block';
    }

    async function renderMateriasManual() {
        const grado    = parseInt(document.getElementById('m-g').value);
        const trimestre = parseInt(document.getElementById('m-t').value);
        const materias = MATERIAS_MANUAL[grado] || MATERIAS_MANUAL[1];

        // Cargar calificaciones existentes
        let calExistentes = [];
        try {
            const res = await apiFetch(`/api/expediente?tipo=calificaciones&id=${alumnoSelManual.id_alumno}`);
            if (res) {
                const data = await res.json();
                const trimData = data.find(c => c.trimestre === trimestre);
                if (trimData) calExistentes = trimData.materias || [];
            }
        } catch(e) {}

        document.getElementById('m-materias').innerHTML = materias.map(sig => {
            const existe = calExistentes.find(m => m.sigla === sig);
            const val = existe ? existe.calif : '';
            const cls = val ? (parseFloat(val) <= 6 ? 'riesgo' : 'ok') : '';
            return `
            <div class="materia-item-manual">
                <div class="materia-label-manual">${sig}</div>
                <input type="number" min="5" max="10" step="1"
                    class="materia-input-manual ${cls}"
                    id="mc-${sig}" value="${val}" placeholder="—"
                    oninput="colorearManual(this)"
                    onblur="validarManual(this)">
            </div>`;
        }).join('');
    }

    function colorearManual(input) {
        const val = parseFloat(input.value);
        input.classList.remove('riesgo', 'ok');
        if (!input.value) return;
        input.classList.add(val <= 6 ? 'riesgo' : 'ok');
    }

    function validarManual(input) {
        if (!input.value) return;
        let val = Math.round(parseFloat(input.value));
        if (val < 5) val = 5;
        if (val > 10) val = 10;
        input.value = val;
        colorearManual(input);
    }

    async function guardarManual() {
        if (!alumnoSelManual) return;
        const grado    = parseInt(document.getElementById('m-g').value);
        const trimestre = parseInt(document.getElementById('m-t').value);
        const materias = MATERIAS_MANUAL[grado] || MATERIAS_MANUAL[1];
        const logBox   = document.getElementById('m-log');

        const payload = materias
            .map(sig => ({ sigla: sig, calif: document.getElementById(`mc-${sig}`)?.value || '' }))
            .filter(m => m.calif !== '');

        if (payload.length === 0) {
            logBox.className = 'log-box log-error'; logBox.style.display = 'block';
            logBox.innerHTML = '❌ Captura al menos una calificación.';
            return;
        }

        logBox.className = 'log-box log-load'; logBox.style.display = 'block';
        logBox.innerHTML = '⏳ Guardando...';

        try {
            const res = await apiFetch('/api/expediente?tipo=calificaciones_manual', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id_alumno: alumnoSelManual.id_alumno,
                    trimestre,
                    materias: payload,
                    promedio_trimestral: parseFloat(
                        (payload.reduce((s, m) => s + parseFloat(m.calif), 0) / payload.length).toFixed(1)
                    )
                })
            });
            if (res && res.ok) {
                logBox.className = 'log-box log-ok';
                logBox.innerHTML = `✅ <strong>¡Guardado!</strong> Calificaciones del trimestre ${trimestre} actualizadas para ${alumnoSelManual.apellidos} ${alumnoSelManual.nombre}.`;
            } else {
                const data = await res.json();
                logBox.className = 'log-box log-error';
                logBox.innerHTML = '❌ Error: ' + (data.error || 'No se pudo guardar.');
            }
        } catch(e) {
            logBox.className = 'log-box log-error';
            logBox.innerHTML = '❌ Error de conexión.';
        }
    }

    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(err => console.warn('SW no registrado:', err));
        });
      }
    </script>
</body>
</html>
