<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente — EST 84</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --azul: #1B4F8A; --azul-hover: #163f6e; --azul-claro: #eff6ff;
            --verde: #2d9b6f; --verde-claro: #f0fdf6;
            --rojo: #e63946; --rojo-claro: #fff0f1;
            --naranja: #f59e0b; --naranja-claro: #fffbeb;
            --fondo: #f0f4f8; --blanco: #fff;
            --texto: #1a2332; --muted: #64748b; --borde: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--fondo); color: var(--texto); padding: 20px 16px 60px; }
        .contenedor { max-width: 960px; margin: 0 auto; }

        /* BARRA SUPERIOR */
        .barra-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
        }
        .barra-top-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn-back {
            display: inline-flex; align-items: center; gap: 7px;
            background: var(--blanco); border: 1px solid var(--borde);
            border-radius: 10px; padding: 9px 16px;
            text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 600;
            transition: background 0.15s;
        }
        .btn-back:hover { background: var(--borde); }
        .btn-pdf {
            display: inline-flex; align-items: center; gap: 7px;
            background: #1e293b; color: white; border: none;
            border-radius: 10px; padding: 9px 16px;
            font-size: 13px; font-weight: 700; font-family: 'Outfit', sans-serif;
            cursor: pointer; transition: background 0.15s;
        }
        .btn-pdf:hover { background: #0f172a; }

        /* CABECERA EXPEDIENTE */
        .cabecera {
            background: var(--azul); color: white; border-radius: 16px;
            padding: 22px 26px; margin-bottom: 16px;
        }
        .perfil-header { display: flex; align-items: center; gap: 20px; }
        .foto-wrapper { position: relative; display: inline-block; flex-shrink: 0; }
        .foto-alumno {
            width: 86px; height: 86px; object-fit: cover;
            border-radius: 50%; border: 3px solid rgba(255,255,255,0.5);
            display: block; pointer-events: none; user-select: none; -webkit-user-drag: none;
        }
        .foto-restringida {
            width: 86px; height: 86px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.25);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            flex-shrink: 0; padding: 8px; pointer-events: none; user-select: none;
        }
        .btn-foto {
            position: absolute; bottom: 4px; right: 4px;
            background: rgba(0,0,0,0.55); color: white;
            border: none; border-radius: 50%; width: 30px; height: 30px;
            font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .btn-foto:hover { background: rgba(0,0,0,0.8); }
        .foto-cargando {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 20px;
        }
        .perfil-info { flex: 1; }
        .perfil-nombre { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .perfil-sub { font-size: 14px; opacity: 0.85; }

        /* SECCIONES */
        .seccion {
            background: var(--blanco); border: 1px solid var(--borde);
            border-radius: 16px; margin-bottom: 16px; overflow: hidden;
        }
        .seccion-header {
            padding: 14px 20px; font-size: 13px; font-weight: 800;
            border-bottom: 1px solid var(--borde);
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--azul);
        }
        .seccion-header.naranja { border-left-color: var(--naranja); color: #92400e; }
        .seccion-header.verde   { border-left-color: var(--verde); color: var(--verde); }
        .seccion-body { padding: 18px 20px; }

        /* Datos socioeconómicos */
        .datos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .dato-card {
            background: #f8fafc; border: 1px solid var(--borde);
            border-radius: 12px; padding: 14px 16px;
        }
        .dato-card h4 {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--azul);
            border-bottom: 1px solid var(--borde); padding-bottom: 8px; margin-bottom: 10px;
        }
        .dato-fila { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f1f5f9; gap: 8px; }
        .dato-fila:last-child { border-bottom: none; }
        .dato-label { font-size: 12px; color: var(--muted); flex-shrink: 0; }
        .dato-valor { font-size: 13px; font-weight: 600; text-align: right; }

        /* Historial de reportes */
        .btn-nueva-obs {
            background: var(--azul); color: white; border: none;
            padding: 9px 16px; border-radius: 9px;
            font-size: 13px; font-weight: 700; font-family: 'Outfit', sans-serif;
            cursor: pointer; transition: background 0.15s;
        }
        .btn-nueva-obs:hover { background: var(--azul-hover); }
        .tabla-reportes { width: 100%; border-collapse: collapse; }
        .tabla-reportes th {
            padding: 10px 14px; text-align: left; font-size: 11px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--muted); border-bottom: 2px solid var(--borde); background: #f8fafc;
        }
        .tabla-reportes td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }
        .tabla-reportes tr:last-child td { border-bottom: none; }
        .tabla-reportes tr:hover td { background: #fafbfc; }
        .chip-grav {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
        }
        .grav-Leve     { background: #fef9c3; color: #854d0e; }
        .grav-Moderada { background: var(--naranja-claro); color: #92400e; }
        .grav-Grave    { background: var(--rojo-claro); color: var(--rojo); }
        .grav-Positiva { background: var(--verde-claro); color: var(--verde); }
        .empty-state { text-align: center; padding: 32px; color: var(--muted); }

        /* Calificaciones */
        .selector-grafica {
            padding: 9px 14px; border: 1.5px solid var(--borde); border-radius: 10px;
            font-size: 13px; font-family: 'Outfit', sans-serif; font-weight: 600;
            color: var(--azul); background: var(--azul-claro); cursor: pointer; outline: none;
            margin-bottom: 18px;
        }
        .chart-wrap { position: relative; height: 240px; margin-bottom: 20px; }
        .boleta-wrap { overflow-x: auto; }
        .tabla-boleta { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; }
        .tabla-boleta th {
            background: #f8fafc; padding: 10px 8px; font-size: 11px;
            color: var(--muted); border-bottom: 2px solid var(--borde); font-weight: 700;
        }
        .tabla-boleta td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; }
        .tabla-boleta tr:last-child td { border-bottom: none; }
        .promedio-cell { font-weight: 800; background: var(--azul-claro); color: var(--azul); border-left: 2px solid #bfdbfe !important; }
        .calif-baja { color: var(--rojo); font-weight: 700; }

        /* Responsive */
        @media (max-width: 640px) {
            .datos-grid { grid-template-columns: 1fr; }
            .perfil-nombre { font-size: 18px; }
            .foto-alumno, .foto-restringida { width: 68px; height: 68px; }
        }

        /* Print */
        @media print {
            body { background: white; padding: 0; }
            .barra-top { display: none !important; }
            .seccion { box-shadow: none; border: 1px solid #ddd; }
            .cabecera { border-radius: 8px; }
        }
    </style>
</head>
<body>
<div class="contenedor">

    <div class="barra-top" id="controles-superiores">
        <div class="barra-top-left">
            <a href="buscador.html" class="btn-back" id="btnRegresar">← Regresar al Directorio</a>
        </div>
        <button class="btn-pdf" onclick="descargarPDF()">🖨️ Descargar PDF</button>
    </div>

    <div id="area-impresion">

        <!-- CABECERA -->
        <div class="cabecera">
            <div class="perfil-header" id="perfilDinamico">
                <div style="padding:20px; color:rgba(255,255,255,0.7);">Cargando expediente...</div>
            </div>
        </div>

        <!-- I. DATOS SOCIOECONÓMICOS -->
        <div class="seccion">
            <div class="seccion-header">I. Datos Socioeconómicos</div>
            <div class="seccion-body" id="contSocio">
                <div class="empty-state">Buscando ficha...</div>
            </div>
        </div>

        <!-- II. HISTORIAL DE OBSERVACIONES -->
        <div class="seccion">
            <div class="seccion-header naranja">
                <span>II. Historial de Observaciones</span>
                <button class="btn-nueva-obs" id="btnNuevaObs"
                    onclick="window.location.href='captura_reporte.html?id_alumno=' + idAlumno">
                    + Registrar Observación
                </button>
            </div>
            <div class="seccion-body">
                <table class="tabla-reportes">
                    <thead>
                        <tr>
                            <th style="width:100px">Fecha</th>
                            <th style="width:100px">Gravedad</th>
                            <th>Motivo</th>
                            <th>Reportado por</th>
                        </tr>
                    </thead>
                    <tbody id="listaReportes"></tbody>
                </table>
            </div>
        </div>

        <!-- III. RENDIMIENTO ACADÉMICO -->
        <div class="seccion">
            <div class="seccion-header verde">III. Rendimiento Académico</div>
            <div class="seccion-body">
                <select class="selector-grafica" id="selectorGrafica" onchange="actualizarGrafica()">
                    <option value="GENERAL">📊 Promedio General</option>
                    <option value="COMPARATIVO" id="optComparativo" style="display:none">🔀 Comparativo entre trimestres</option>
                </select>
                <div class="chart-wrap">
                    <canvas id="graficaPromedios"></canvas>
                </div>
                <div class="boleta-wrap" id="contBoleta"></div>
            </div>
        </div>

    </div>
</div>

<!-- Input oculto foto -->
<input type="file" id="inputFotoAlumno" accept="image/*" style="display:none" onchange="subirFotoAlumno(this)">

<script src="auth-helper.js"></script>
<script>
    verificarSesion();

    const idAlumno   = new URLSearchParams(window.location.search).get('id_alumno');
    const rolActivo  = localStorage.getItem('rolActivo');
    let chartInstance = null;
    let datosCalificacionesGlobal = [];
    let fotoActualSrc = '';

    window.onload = async () => {
        if (!idAlumno) return window.location.href = 'buscador.html';

        // Botón regresar según rol
        const btnReg = document.getElementById('btnRegresar');
        if (rolActivo === 'ADMINISTRADOR' || rolActivo === 'DIRECTIVO') {
            btnReg.href = 'dashboard.html'; btnReg.textContent = '← Volver al Dashboard';
            if (rolActivo === 'ADMINISTRADOR') {
                const extra = document.createElement('a');
                extra.href = 'buscador.html'; extra.className = 'btn-back';
                extra.textContent = '🔍 Ir al Buscador';
                btnReg.insertAdjacentElement('afterend', extra);
            }
        }

        await cargarTodo();
        registrarLog('VER_EXPEDIENTE', `Alumno ID: ${idAlumno}`);
    };

    async function cargarTodo() {
        try {
            // Alumno
            const resAlu = await apiFetch(`/api/alumnos?id=${idAlumno}`);
            const a = await resAlu.json();
            fotoActualSrc = a['fotos-alumnos'] || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            const puedeEditarFoto = rolActivo === 'ADMINISTRADOR' || rolActivo === 'DIRECTIVO';
            const btnFotoHTML = puedeEditarFoto
                ? `<button class="btn-foto" onclick="document.getElementById('inputFotoAlumno').click()" title="Cambiar foto">📷</button>` : '';

            document.getElementById('perfilDinamico').innerHTML = `
                <div class="foto-wrapper" id="fotoWrapper">
                    <img src="${esc(fotoActualSrc)}" class="foto-alumno" id="imgFotoAlumno"
                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                    ${btnFotoHTML}
                </div>
                <div class="perfil-info">
                    <div class="perfil-nombre">${esc(a.apellidos)} ${esc(a.nombre)}</div>
                    <div class="perfil-sub">Grado: <strong>${a.grado}°</strong> · Grupo: <strong>"${a.grupo}"</strong></div>
                </div>`;

            // Ficha socioeconómica
            const resFicha = await apiFetch(`/api/expediente?tipo=ficha&id=${idAlumno}`);
            const f = await resFicha.json();
            const ROLES_PRIVADOS = ['DOCENTE', 'PREFECTO'];
            const esRestringido  = ROLES_PRIVADOS.includes(rolActivo);
            const CAMPOS_PRIV    = ['domicilio_calle','telefono_casa','tutor_telefono','madre_telefono','padre_telefono'];
            const v = (val, campo = null) => {
                if (campo && esRestringido && CAMPOS_PRIV.includes(campo))
                    return '<span style="color:#94a3b8; font-size:12px; font-style:italic;">🔒 Restringido</span>';
                return esc(val || '—');
            };
            const fila = (label, val) =>
                `<div class="dato-fila"><span class="dato-label">${label}</span><span class="dato-valor">${val}</span></div>`;

            if (f && f.id_alumno) {
                document.getElementById('contSocio').innerHTML = `
                <div class="datos-grid">
                    <div class="dato-card">
                        <h4>👤 Tutor / Responsable</h4>
                        ${fila('Nombre', v(f.tutor_nombre))}
                        ${fila('Parentesco', v(f.tutor_parentesco))}
                        ${fila('Teléfono', v(f.tutor_telefono, 'tutor_telefono'))}
                        ${fila('Ocupación', v(f.tutor_ocupacion))}
                    </div>
                    <div class="dato-card">
                        <h4>👨‍👩‍👧 Familia</h4>
                        ${fila('Madre', v(f.madre_nombre))}
                        ${fila('Tel. Madre', v(f.madre_telefono, 'madre_telefono'))}
                        ${fila('Padre', v(f.padre_nombre))}
                        ${fila('Tel. Padre', v(f.padre_telefono, 'padre_telefono'))}
                        ${fila('Vive con', v(f.con_quien_vive))}
                        ${fila('No. hermanos', v(f.num_hermanos != null ? String(f.num_hermanos) : null))}
                    </div>
                    <div class="dato-card">
                        <h4>🏠 Domicilio y Vivienda</h4>
                        ${fila('Domicilio', v(f.domicilio_calle, 'domicilio_calle'))}
                        ${fila('Tel. casa', v(f.telefono_casa, 'telefono_casa'))}
                        ${fila('Tipo vivienda', v(f.vivienda_tipo))}
                        ${fila('Servicios', v(f.vivienda_servicios))}
                    </div>
                    <div class="dato-card">
                        <h4>💰 Económico y Salud</h4>
                        ${fila('Ingreso mensual', v(f.ingreso_mensual))}
                        ${fila('Condición médica', v(f.condicion_salud))}
                        ${fila('Discapacidad', v(f.discapacidad))}
                        ${fila('Observaciones', v(f.observaciones))}
                    </div>
                </div>`;
            } else {
                document.getElementById('contSocio').innerHTML =
                    '<div class="empty-state"><div style="font-size:32px;margin-bottom:8px;">📋</div><p>Sin ficha socioeconómica capturada.</p></div>';
            }

            // Reportes
            const resRep = await apiFetch(`/api/reportes?id=${idAlumno}`);
            const reportes = await resRep.json();
            document.getElementById('listaReportes').innerHTML = (reportes && reportes.length > 0)
                ? reportes.map(r => `<tr>
                    <td style="white-space:nowrap; color:var(--muted);">${esc(r.fecha)}</td>
                    <td><span class="chip-grav grav-${esc(r.gravedad)}">${esc(r.gravedad)}</span></td>
                    <td>${esc(r.motivo)}</td>
                    <td style="color:var(--muted); font-size:12px;">${esc(r.nombre_reporta || '—')}</td>
                  </tr>`).join('')
                : '<tr><td colspan="4" class="empty-state">Historial limpio.</td></tr>';

            // Calificaciones
            const resCal = await apiFetch(`/api/expediente?tipo=calificaciones&id=${idAlumno}`);
            datosCalificacionesGlobal = await resCal.json();

            if (datosCalificacionesGlobal.length > 0) {
                const sel = document.getElementById('selectorGrafica');
                datosCalificacionesGlobal[0].materias.forEach(m =>
                    sel.innerHTML += `<option value="${m.sigla}">📚 ${m.sigla}</option>`);
                if (datosCalificacionesGlobal.length >= 2)
                    document.getElementById('optComparativo').style.display = '';
                renderBoleta();
                actualizarGrafica();
            } else {
                document.getElementById('selectorGrafica').style.display = 'none';
                document.getElementById('graficaPromedios').style.display = 'none';
                document.getElementById('contBoleta').innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:36px;margin-bottom:8px;">📭</div>
                        <p style="font-weight:700; color:var(--muted);">Sin calificaciones registradas</p>
                        <p style="font-size:13px;margin-top:4px;">Se cargarán mediante la herramienta de importación.</p>
                    </div>`;
            }
        } catch(e) { console.error('Error cargando expediente', e); }
    }

    async function subirFotoAlumno(input) {
        const archivo = input.files[0];
        if (!archivo) return;
        const wrapper = document.getElementById('fotoWrapper');
        const cargando = document.createElement('div');
        cargando.className = 'foto-cargando'; cargando.innerHTML = '⏳';
        wrapper.appendChild(cargando);
        const formData = new FormData();
        formData.append('foto', archivo); formData.append('id_alumno', idAlumno);
        try {
            const res  = await apiFetch('/api/foto-alumno', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.url) {
                document.getElementById('imgFotoAlumno').src = data.url + '?t=' + Date.now();
                fotoActualSrc = data.url;
                cargando.innerHTML = '✅';
            } else { cargando.innerHTML = '❌'; }
        } catch { cargando.innerHTML = '❌'; }
        setTimeout(() => cargando.remove(), 1500);
        input.value = '';
    }

    function renderBoleta() {
        const materias = datosCalificacionesGlobal[0].materias;
        let html = `<table class="tabla-boleta"><thead><tr><th>TRIMESTRE</th>`;
        materias.forEach(m => html += `<th>${m.sigla}</th>`);
        html += `<th class="promedio-cell">PROM</th></tr></thead><tbody>`;
        datosCalificacionesGlobal.forEach(c => {
            html += `<tr><td><strong>T${c.trimestre}</strong></td>`;
            c.materias.forEach(m => {
                const baja = parseFloat(m.calif) < 6;
                html += `<td class="${baja ? 'calif-baja' : ''}">${m.calif}</td>`;
            });
            html += `<td class="promedio-cell">${c.promedio_trimestral.toFixed(1)}</td></tr>`;
        });
        document.getElementById('contBoleta').innerHTML = html + `</tbody></table>`;
    }

    function actualizarGrafica() {
        const filtro = document.getElementById('selectorGrafica').value;
        if (chartInstance) chartInstance.destroy();
        const ctx = document.getElementById('graficaPromedios').getContext('2d');
        const COLORES = ['#E63946','#1B4F8A','#FF9800','#2d9b6f','#7B1FA2','#F50057','#43A047','#FF6D00','#1565C0','#C62828','#00838F'];

        if (filtro === 'COMPARATIVO') {
            const labels   = datosCalificacionesGlobal.map(c => `Trimestre ${c.trimestre}`);
            const materias = datosCalificacionesGlobal[0].materias;
            const datasets = materias.map((m, i) => ({
                label: m.sigla,
                data: datosCalificacionesGlobal.map(c => c.materias.find(x => x.sigla === m.sigla)?.calif || null),
                borderColor: COLORES[i % COLORES.length],
                backgroundColor: COLORES[i % COLORES.length] + '22',
                fill: false, tension: 0.3, pointRadius: 5
            }));
            datasets.unshift({
                label: 'PROMEDIO GENERAL',
                data: datosCalificacionesGlobal.map(c => c.promedio_trimestral),
                borderColor: '#1e293b', backgroundColor: 'transparent',
                borderWidth: 3, borderDash: [6,3], fill: false, tension: 0.3, pointRadius: 6
            });
            chartInstance = new Chart(ctx, {
                type: 'line', data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11, family: 'Outfit' } } } },
                    scales: { y: { min: 5, max: 10, ticks: { stepSize: 0.5 }, grid: { color: '#f1f5f9' } } }
                }
            });
        } else {
            const labels  = datosCalificacionesGlobal.map(c => `Trimestre ${c.trimestre}`);
            const valores = datosCalificacionesGlobal.map(c =>
                filtro === 'GENERAL' ? c.promedio_trimestral
                    : parseFloat(c.materias.find(m => m.sigla === filtro)?.calif || 0));
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{
                    label: filtro === 'GENERAL' ? 'Promedio General' : filtro,
                    data: valores,
                    borderColor: '#1B4F8A', backgroundColor: 'rgba(27,79,138,0.08)',
                    fill: true, tension: 0.3,
                    pointBackgroundColor: valores.map(v => v < 6 ? '#e63946' : '#1B4F8A'),
                    pointRadius: 6, pointHoverRadius: 8
                }]},
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: c => ` ${c.parsed.y.toFixed(1)}${c.parsed.y < 6 ? ' ⚠️' : ''}` } }
                    },
                    scales: { y: { min: 5, max: 10, ticks: { stepSize: 0.5 }, grid: { color: '#f1f5f9' } } }
                }
            });
        }
    }

    document.addEventListener('contextmenu', e => {
        if (e.target?.id === 'imgFotoAlumno') e.preventDefault();
    });

    async function descargarPDF() {
        const nav = document.getElementById('controles-superiores');
        nav.style.display = 'none';
        const imgEl = document.getElementById('imgFotoAlumno');
        const srcOrig = imgEl?.src;
        const btnFoto = document.querySelector('.btn-foto');
        if (imgEl && fotoActualSrc) {
            try {
                const res = await apiFetch(fotoActualSrc);
                if (res) { const blob = await res.blob(); const reader = new FileReader(); reader.onloadend = () => imgEl.src = reader.result; reader.readAsDataURL(blob); }
            } catch {}
        }
        if (btnFoto) btnFoto.style.display = 'none';
        await html2pdf().set({
            margin: 15, filename: `Expediente_${idAlumno}.pdf`,
            html2canvas: { scale: 2, useCORS: true, allowTaint: false },
            jsPDF: { format: 'letter' },
            pagebreak: { mode: ['avoid-all','css','legacy'] }
        }).from(document.getElementById('area-impresion')).save();
        nav.style.display = 'flex';
        if (imgEl && srcOrig) imgEl.src = srcOrig;
        if (btnFoto) btnFoto.style.display = 'flex';
    }
</script>
</body>
</html>
