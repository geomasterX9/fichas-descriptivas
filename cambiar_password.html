<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - EST 84</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1B4F8A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sist. EST 84">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <style>
        :root {
            --azul: #1B4F8A; --azul-hover: #163f6e; --azul-claro: #eff6ff;
            --verde: #2d9b6f; --rojo: #e63946;
            --fondo: #f0f4f8; --blanco: #fff;
            --texto: #1a2332; --muted: #64748b; --borde: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--fondo); min-height: 100vh; }

        .navbar {
            background: var(--azul); padding: 0 24px; height: 62px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 12px rgba(27,79,138,0.25);
            position: sticky; top: 0; z-index: 100;
        }
        .navbar-brand { color: white; font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .btn-nav {
            text-decoration: none; color: rgba(255,255,255,0.85); font-weight: 600;
            font-size: 13px; padding: 7px 14px; border-radius: 8px;
            border: none; background: none; cursor: pointer; font-family: 'Outfit', sans-serif;
        }
        .btn-nav.salir { color: #fca5a5; }

        .contenido { max-width: 480px; margin: 40px auto; padding: 0 16px 60px; }

        .card {
            background: var(--blanco); border-radius: 16px;
            border: 1px solid var(--borde); overflow: hidden;
        }
        .card-header {
            background: var(--azul); padding: 24px;
            display: flex; align-items: center; gap: 14px;
        }
        .card-header-icon {
            width: 48px; height: 48px; background: rgba(255,255,255,0.15);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 22px; flex-shrink: 0;
        }
        .card-header-text h2 { color: white; font-size: 18px; font-weight: 800; }
        .card-header-text p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 3px; }
        .card-body { padding: 28px; }

        label {
            display: block; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--muted); margin-bottom: 6px;
        }
        .input-wrapper { position: relative; margin-bottom: 20px; }
        input[type="password"], input[type="text"] {
            width: 100%; padding: 12px 44px 12px 14px;
            border: 1.5px solid var(--borde); border-radius: 10px;
            font-size: 14px; font-family: 'Outfit', sans-serif;
            color: var(--texto); background: var(--blanco);
            transition: border-color 0.15s; outline: none;
        }
        input:focus { border-color: var(--azul); }
        .toggle-pw {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; font-size: 16px;
            color: var(--muted); padding: 4px;
        }

        .fortaleza { margin-bottom: 20px; }
        .fortaleza-barra {
            height: 4px; border-radius: 2px; background: var(--borde);
            margin-top: 6px; overflow: hidden;
        }
        .fortaleza-fill {
            height: 100%; border-radius: 2px; transition: all 0.3s;
            width: 0%; background: var(--rojo);
        }
        .fortaleza-txt { font-size: 11px; color: var(--muted); margin-top: 4px; }

        .btn-guardar {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: var(--azul); color: white;
            font-size: 15px; font-weight: 700; font-family: 'Outfit', sans-serif;
            cursor: pointer; transition: background 0.15s;
        }
        .btn-guardar:hover { background: var(--azul-hover); }
        .btn-guardar:disabled { opacity: 0.6; cursor: not-allowed; }

        .alerta {
            padding: 12px 16px; border-radius: 10px; font-size: 13px;
            font-weight: 600; margin-bottom: 20px; display: none;
        }
        .alerta.error { background: #fff0f1; color: var(--rojo); border: 1px solid #fecdd3; }
        .alerta.exito { background: #f0fdf6; color: var(--verde); border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">🔒 Seguridad de cuenta</div>
    <div>
        <a href="#" id="btnVolver" class="btn-nav">← Volver</a>
        <button onclick="cerrarSesion()" class="btn-nav salir">Salir 👋</button>
    </div>
</nav>

<div class="contenido">
    <div class="card">
        <div class="card-header">
            <div class="card-header-icon">🔑</div>
            <div class="card-header-text">
                <h2>Cambiar contraseña</h2>
                <p id="lblUsuario">Cargando...</p>
            </div>
        </div>
        <div class="card-body">
            <div class="alerta error" id="alertaError"></div>
            <div class="alerta exito" id="alertaExito"></div>

            <label>Contraseña actual</label>
            <div class="input-wrapper">
                <input type="password" id="pwActual" placeholder="Tu contraseña actual" autocomplete="current-password">
                <button type="button" class="toggle-pw" onclick="togglePw('pwActual', this)">👁️</button>
            </div>

            <label>Nueva contraseña</label>
            <div class="input-wrapper">
                <input type="password" id="pwNueva" placeholder="Mínimo 5 caracteres" autocomplete="new-password" oninput="checkFortaleza()">
                <button type="button" class="toggle-pw" onclick="togglePw('pwNueva', this)">👁️</button>
            </div>
            <div class="fortaleza">
                <div class="fortaleza-barra"><div class="fortaleza-fill" id="barraFortaleza"></div></div>
                <div class="fortaleza-txt" id="txtFortaleza"></div>
            </div>

            <label>Confirmar nueva contraseña</label>
            <div class="input-wrapper">
                <input type="password" id="pwConfirm" placeholder="Repite la nueva contraseña" autocomplete="new-password">
                <button type="button" class="toggle-pw" onclick="togglePw('pwConfirm', this)">👁️</button>
            </div>

            <button class="btn-guardar" id="btnGuardar" onclick="guardar()">ACTUALIZAR CONTRASEÑA</button>
        </div>
    </div>
</div>

<script src="auth-helper.js"></script>
<script>
    verificarSesion();

    const rol = localStorage.getItem('rolActivo');
    const nombre = localStorage.getItem('nombreActivo');

    // Botón volver según rol
    document.getElementById('lblUsuario').textContent = nombre || '—';
    const volver = document.getElementById('btnVolver');
    if (rol === 'ADMINISTRADOR' || rol === 'DIRECTIVO') volver.href = 'dashboard.html';
    else volver.href = 'inicio.html';

    function togglePw(id, btn) {
        const input = document.getElementById(id);
        if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
        else { input.type = 'password'; btn.textContent = '👁️'; }
    }

    function checkFortaleza() {
        const pw = document.getElementById('pwNueva').value;
        const barra = document.getElementById('barraFortaleza');
        const txt = document.getElementById('txtFortaleza');
        let score = 0;
        if (pw.length >= 5)  score++;
        if (pw.length >= 8)  score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        const niveles = [
            { pct: '0%',   color: 'var(--borde)', label: '' },
            { pct: '25%',  color: 'var(--rojo)',   label: 'Muy débil' },
            { pct: '50%',  color: '#f97316',        label: 'Débil' },
            { pct: '75%',  color: 'var(--naranja)', label: 'Aceptable' },
            { pct: '90%',  color: '#84cc16',        label: 'Buena' },
            { pct: '100%', color: 'var(--verde)',   label: 'Excelente' },
        ];
        const n = niveles[score] || niveles[0];
        barra.style.width = n.pct;
        barra.style.background = n.color;
        txt.textContent = n.label;
    }

    function mostrarAlerta(tipo, msg) {
        document.getElementById('alertaError').style.display = 'none';
        document.getElementById('alertaExito').style.display = 'none';
        const el = document.getElementById('alerta' + (tipo === 'error' ? 'Error' : 'Exito'));
        el.textContent = msg;
        el.style.display = 'block';
    }

    async function guardar() {
        const actual  = document.getElementById('pwActual').value;
        const nueva   = document.getElementById('pwNueva').value;
        const confirm = document.getElementById('pwConfirm').value;

        if (!actual || !nueva || !confirm) return mostrarAlerta('error', 'Completa todos los campos.');
        if (nueva.length < 5) return mostrarAlerta('error', 'La nueva contraseña debe tener al menos 5 caracteres.');
        if (nueva !== confirm) return mostrarAlerta('error', 'Las contraseñas nuevas no coinciden.');

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true; btn.textContent = 'Guardando...';

        try {
            const res = await apiFetch('/api/usuarios', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    accion: 'cambiar_password',
                    password_actual: actual,
                    password_nueva: nueva
                })
            });
            const data = await res.json();
            if (res.ok) {
                mostrarAlerta('exito', '✅ Contraseña actualizada correctamente.');
                document.getElementById('pwActual').value = '';
                document.getElementById('pwNueva').value = '';
                document.getElementById('pwConfirm').value = '';
                checkFortaleza();
            } else {
                mostrarAlerta('error', data.error || 'Error al actualizar.');
            }
        } catch (e) {
            mostrarAlerta('error', 'Error de conexión.');
        }
        btn.disabled = false; btn.textContent = 'ACTUALIZAR CONTRASEÑA';
    }

    function cerrarSesion() { localStorage.clear(); window.location.href = 'index.html'; }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .catch(err => console.warn('SW no registrado:', err));
    });
  }
</script>
</body>
</html>
