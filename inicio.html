<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - EST 84</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #0061f2; --fondo: #f2f5f9; --blanco: #ffffff; --texto: #2c3e50; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--fondo);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        .header {
            background: var(--azul);
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(0,97,242,0.3);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { font-size: 28px; }
        .header-title { font-size: 16px; font-weight: 700; }
        .header-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .header-right { text-align: right; }
        .header-nombre { font-size: 14px; font-weight: 600; }
        .header-rol {
            font-size: 11px;
            background: rgba(255,255,255,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 4px;
            display: inline-block;
        }

        /* ── BIENVENIDA ── */
        .bienvenida {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .bienvenida h2 {
            font-size: 22px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .bienvenida p {
            font-size: 14px;
            color: #69707a;
        }

        /* ── OPCIONES ── */
        .opciones {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 30px 24px 40px;
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
        }

        .btn-opcion {
            background: var(--blanco);
            border: none;
            border-radius: 20px;
            padding: 32px 28px;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
            color: inherit;
        }
        .btn-opcion:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .btn-opcion:active { transform: translateY(0); }

        .opcion-icono {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            flex-shrink: 0;
        }
        .icono-reporte  { background: #fff0f0; }
        .icono-expediente { background: #f0f6ff; }

        .opcion-texto { flex: 1; }
        .opcion-titulo {
            font-size: 20px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .opcion-desc {
            font-size: 13px;
            color: #69707a;
            line-height: 1.5;
        }
        .opcion-flecha {
            font-size: 22px;
            color: #c0cfe0;
        }

        /* ── CERRAR SESIÓN ── */
        .pie {
            text-align: center;
            padding: 0 24px 30px;
        }
        .btn-cerrar {
            background: none;
            border: 1px solid #d1d9e6;
            color: #69707a;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-cerrar:hover { background: #fee; border-color: #e74c3c; color: #e74c3c; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="header-logo">🎓</div>
            <div>
                <div class="header-title">Gestión Escolar</div>
                <div class="header-sub">Técnica 84</div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-nombre" id="headerNombre">—</div>
            <div class="header-rol" id="headerRol">—</div>
        </div>
    </div>

    <div class="bienvenida">
        <h2 id="saludo">Buenos días</h2>
        <p>¿Qué deseas hacer hoy?</p>
    </div>

    <div class="opciones">

        <a class="btn-opcion" href="buscador.html?modo=reporte" id="btnReporte">
            <div class="opcion-icono icono-reporte">📋</div>
            <div class="opcion-texto">
                <div class="opcion-titulo">Registrar Reporte</div>
                <div class="opcion-desc">Captura un reporte disciplinario o de conducta para un alumno.</div>
            </div>
            <div class="opcion-flecha">›</div>
        </a>

        <a class="btn-opcion" href="buscador.html">
            <div class="opcion-icono icono-expediente">📁</div>
            <div class="opcion-texto">
                <div class="opcion-titulo">Consultar Expediente</div>
                <div class="opcion-desc">Busca a un alumno y revisa su expediente académico y disciplinario.</div>
            </div>
            <div class="opcion-flecha">›</div>
        </a>

    </div>

    <div class="pie">
        <button class="btn-cerrar" onclick="cerrarSesion()">🚪 Cerrar Sesión</button>
    </div>

    <script src="auth-helper.js"></script>
<script>
        verificarSesion();
        

        const nombre = localStorage.getItem('nombreActivo') || 'Usuario';
        const rol    = localStorage.getItem('rolActivo') || '';

        // Si no hay sesión activa, regresar al login
        if (!rol) window.location.href = 'index.html';

        // Redirigir si el rol no corresponde a esta pantalla
        if (rol === 'ADMINISTRADOR' || rol === 'DIRECTIVO') {
            window.location.href = 'dashboard.html';
        } else if (rol === 'TRABAJO SOCIAL') {
            window.location.href = 'buscador.html';
        }

        // Encabezado
        document.getElementById('headerNombre').textContent = nombre;
        document.getElementById('headerRol').textContent = rol;

        // Saludo según la hora
        const hora = new Date().getHours();
        let saludo = hora < 12 ? 'Buenos días' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';
        // Extraer primer nombre
        const primerNombre = nombre.split(' ')[0];
        document.getElementById('saludo').textContent = `${saludo}, ${primerNombre} 👋`;

        // Ocultar botón Reporte si es solo Trabajo Social (por si acaso llega aquí)
        if (rol === 'TRABAJO SOCIAL') {
            document.getElementById('btnReporte').style.display = 'none';
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
